services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tclapp
      POSTGRES_USER: tclapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tclapp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tclapp"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      DATABASE_URL: jdbc:postgresql://postgres:5432/tclapp
      DATABASE_USER: tclapp
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-tclapp}
      JWT_SECRET: ${JWT_SECRET:-devsecret}
      SALT_HASH_SECRET: ${SALT_HASH_SECRET:-devsecret}
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config: